{% if site.newsletter.form_action %}
<div class="newsletter-signup" style="background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 20px; margin: 24px 0; text-align: center;">
    <h3 style="margin-top: 0;">Subscribe to the weekly newsletter</h3>
    <p style="color: #57606a; font-size: 0.9em;">Get a weekly digest of new posts on Power Platform, MCP, and enterprise integrations.</p>
    <form method="POST" action="{{ site.newsletter.form_action }}" style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        <input type="email" name="EMAIL" placeholder="you@example.com" required
               style="padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 4px; font-size: 0.95em; min-width: 220px;" />
        <input type="hidden" name="locale" value="en" />
        <input type="hidden" name="html_type" value="simple" />
        <button type="submit"
                style="padding: 8px 16px; background: #0969da; color: white; border: none; border-radius: 4px; font-size: 0.95em; cursor: pointer;">
            Subscribe
        </button>
    </form>
</div>
{% endif %}
