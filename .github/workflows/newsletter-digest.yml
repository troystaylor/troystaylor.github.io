name: Weekly Newsletter Digest

on:
  schedule:
    # Every Saturday at 9:00 AM UTC
    - cron: '0 9 * * 6'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      days:
        description: 'Look back N days for posts'
        required: false
        default: '7'
      dry_run:
        description: 'Dry run (no API call)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-frontmatter markdown

      - name: Generate digest
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        run: |
          ARGS="--days ${{ github.event.inputs.days || '7' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/generate-digest.py $ARGS
